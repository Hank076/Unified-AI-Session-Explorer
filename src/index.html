<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Projects Browser</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app">
      <header class="app-header">
        <div class="app-header-row">
          <div>
            <h1>Claude Projects Browser</h1>
            <p>瀏覽 ~/.claude/projects、session 與 MEMORY.md</p>
          </div>
          <div class="theme-switch" role="radiogroup" aria-label="主題模式">
            <button
              id="theme-auto"
              class="theme-btn"
              type="button"
              data-theme-mode="auto"
              role="radio"
              aria-checked="false"
            >
              Auto
            </button>
            <button
              id="theme-light"
              class="theme-btn"
              type="button"
              data-theme-mode="light"
              role="radio"
              aria-checked="false"
            >
              Light
            </button>
            <button
              id="theme-dark"
              class="theme-btn"
              type="button"
              data-theme-mode="dark"
              role="radio"
              aria-checked="false"
            >
              Dark
            </button>
          </div>
        </div>
      </header>

      <section id="panel-grid" class="panel-grid" aria-label="Projects Explorer">
        <aside id="projects-panel" class="panel" aria-label="Projects">
          <h2>Projects</h2>
          <ul id="projects-list" class="list"></ul>
        </aside>

        <div
          id="resizer-left"
          class="col-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="調整 Projects 與 Entries 欄寬"
        ></div>

        <aside id="entries-panel" class="panel" aria-label="Entries">
          <h2>Entries</h2>
          <ul id="entries-list" class="list"></ul>
        </aside>

        <div
          id="resizer-middle"
          class="col-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="調整 Entries 與 Viewer 欄寬"
        ></div>

        <section id="viewer-panel" class="panel viewer" aria-label="Viewer">
          <div class="viewer-header-row">
            <h2 id="viewer-title">Viewer</h2>
            <label class="chat-only-toggle" for="chat-only-toggle">
              <input id="chat-only-toggle" type="checkbox" />
              只看對話
            </label>
          </div>
          <div id="viewer-meta" class="meta"></div>
          <div id="status" class="status" role="status" aria-live="polite"></div>
          <div id="viewer-content" class="viewer-content">
            <p class="placeholder">請先選擇專案與項目。</p>
          </div>
        </section>
      </section>
    </main>
    <div id="path-tooltip" class="path-tooltip" role="tooltip" hidden></div>
  </body>
</html>
